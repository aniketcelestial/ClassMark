name: classmark
description: A smart attendance marking app with OTP and geofencing.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1

  # Location & Geofencing
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.1
  uuid: ^4.4.2
  logger: ^2.4.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/