name: classmark
description: A smart attendance marking app with OTP and Bluetooth proximity.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # BLE
  flutter_blue_plus: ^1.32.12
  flutter_ble_peripheral: ^1.0.1

  #device_info
  device_info_plus: ^10.1.0

  # UI
  glassmorphism: ^3.0.0
  animate_do: ^3.3.4
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  logger: ^2.4.0
  go_router: ^14.2.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true